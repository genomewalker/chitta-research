# Rationale: All three questions have binary or low-variance answers derivable from data already in the system. If the confidence scorer is broken, all 27 claims require reinterpretation before any new experiment is valid. If failed runs are silently dropped, the belief graph's confidence ordering is untrustworthy. If chitta recall is causing Hotr to skip duplicate hypotheses without surfacing the prior failure, the circular evaluation problem is confirmed with evidence rather than conjecture. These audits are prerequisites for any meaningful architecture benchmark — running benchmarks on a broken measurement substrate produces only more uninterpretable results.
programs:
  - title: "Fix Instrumentation Before Expanding Scope: Three Binary Audits"
    domain: software_engineering
    questions:
      - "Is the NaN panic reachable from any unauthenticated external API call in the current service boundary, or does it require authenticated YAML file write access — binary outcome required?"
      - "What is the actual distribution of confidence scores across all 27 claims, and is the 0.90 uniformity an artifact of score rounding, prompt anchoring, or claim selection bias — is the scorer broken?"
      - "Of the 17 untested hypotheses, what fraction are structurally identical to already-confirmed hypotheses, and were they skipped because chitta recall returned a prior confirmation before hypothesis generation — does existing log data answer this without new experiments?"
    methods:
      - "Trace the YAML deserialization call stack from the public API surface inward using cargo-call-graph or manual tracing; record every auth and validation gate between external input and the NaN-susceptible field; report binary: reachable or not from unauthenticated path"
      - "Dump all 27 claim confidence scores and plot the full distribution; if variance is below 0.05, identify the prompt clause or postprocessing step causing saturation and remove it before any further confidence-weighted decisions are made"
      - "List all 17 untested hypotheses and for each check the chitta recall log to determine whether a prior confirmed claim was returned before hypothesis generation — this directly tests the Hotr blindness and confirmation-bias hypotheses using artifacts already in the system, requiring no new experiments"
      - "Audit all hypothesis and run records across sessions for silent drops: compute success rate, failure rate, and missing-run rate explicitly; if any failed runs are absent from the record, treat the 16/16 success rate as invalid"
    priority: 1.0
    max_budget_usd: 10.0

